<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro || Market Blue</title>
    <link rel="shortcut icon" href="../IMG/favicon.webp" type="image/x-icon" />
    <link rel="stylesheet" href="./CSS/cadastro.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=shopping_cart_checkout"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oleo+Script:wght@400;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="#" >Inicio</a></li>
          <li><a href="#" >Sobre</a></li>
          <li><a href="#" >Suporte</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <form action="" method="post" class="formulario">
        <div class="logo">
          <span class="material-symbols-outlined">shopping_cart_checkout</span>
        </div>
        <h1>Sign Up</h1>
        <input
          type="email"
          name="email"
          id="email"
          placeholder="EMAIL"
          required
        />
        <input
          type="text"
          name="username"
          id="Username"
          placeholder="USERNAME"
          required
        />
        <input
          type="password"
          name="password"
          id="password"
          placeholder="PASSWORD"
          required
        />
        <input
          type="text"
          id="rua"
          name="rua"
          autocomplete="street-address"
          placeholder="Street, number, complement"
        />
        <button type="submit">REGISTER</button>
        <a href="login.html" class="voltar">Você já está registrado?</a
        >
      </form>
    </main>
  </body>
</html>
